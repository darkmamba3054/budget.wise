<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Checker — BudgetWise</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script src="nav.js"></script>

<div class="page">
  <div class="page-header">
    <h1>Purchase Checker</h1>
    <p>Before you buy — slow down and think it through.</p>
  </div>

  <!-- What are you buying -->
  <div class="card" style="margin-bottom:20px;">
    <div class="section-header" style="margin-bottom:16px;">
      <h2>What are you thinking of buying?</h2>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Item name</label>
        <input type="text" id="item-name" placeholder="e.g. New headphones">
      </div>
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" id="item-price" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
  </div>

  <!-- Questions -->
  <div class="checker-card">
    <h2>The pause checklist</h2>
    <p>Check off each question honestly before deciding. No judgment — just clarity.</p>

    <div class="question-item">
      <input type="checkbox" id="q1" onchange="updateVerdict()">
      <label for="q1">Do I actually need this, or do I just want it right now in this moment?</label>
    </div>
    <div class="question-item">
      <input type="checkbox" id="q2" onchange="updateVerdict()">
      <label for="q2">Have I wanted this for more than 48 hours, or did I just see it?</label>
    </div>
    <div class="question-item">
      <input type="checkbox" id="q3" onchange="updateVerdict()">
      <label for="q3">Does this fit within my remaining budget this month?</label>
    </div>
    <div class="question-item">
      <input type="checkbox" id="q4" onchange="updateVerdict()">
      <label for="q4">Do I have something that already does this job?</label>
    </div>
    <div class="question-item">
      <input type="checkbox" id="q5" onchange="updateVerdict()">
      <label for="q5">Will I still be glad I bought this in 30 days?</label>
    </div>
    <div class="question-item">
      <input type="checkbox" id="q6" onchange="updateVerdict()">
      <label for="q6">Am I in a calm headspace right now — not stressed, bored, or impulsive?</label>
    </div>

    <div class="verdict" id="verdict"></div>

    <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="logDecision('bought')">I bought it</button>
      <button class="btn btn-outline" onclick="logDecision('waited')">I waited</button>
      <button class="btn btn-danger" onclick="logDecision('skipped')">I skipped it</button>
    </div>
  </div>

  <!-- Decision log -->
  <div class="section-header">
    <h2>Decision log</h2>
    <span style="font-size:13px; color:var(--text2);">Accountability partners can comment on any decision</span>
  </div>
  <div id="decisions-list"></div>
</div>

<style>
  .decision-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .decision-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; }
  .decision-header:hover { background: var(--bg); }
  .decision-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .decision-name { font-weight: 500; font-size: 14px; }
  .comment-section { border-top: 1px solid var(--border); padding: 14px 16px; background: var(--bg); display: none; }
  .comment-section.open { display: block; }
  .comment { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 8px; }
  .comment-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .comment-author { font-size: 12px; font-weight: 600; color: var(--green); }
  .comment-date { font-size: 11px; color: var(--text3); }
  .comment-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .add-comment { display: flex; gap: 8px; margin-top: 10px; }
  .add-comment textarea { flex: 1; padding: 8px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--card); color: var(--text); resize: none; height: 38px; outline: none; }
  .add-comment textarea:focus { border-color: var(--green); }
  .comment-count { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--text3); }
  .comment-count.has-comments { color: var(--green); font-weight: 500; }
</style>

<script>
  // Decisions stored with comments
  let decisions = [
    { id:'d1', name:'New desk chair', price:280, score:5, decision:'bought', date:'May 8', comments:[
      { author:'Victor', date:'May 9', text:'Good call — you needed this for your back. Worth it.' }
    ]},
    { id:'d2', name:'Gaming keyboard', price:140, score:2, decision:'waited', date:'May 3', comments:[] },
    { id:'d3', name:'Smart watch', price:320, score:1, decision:'skipped', date:'Apr 28', comments:[
      { author:'Victor', date:'Apr 29', text:'Smart move skipping this one. Not the right time with the debt paydown happening.' }
    ]},
  ];

  let openDecision = null;
  const isReadOnly = window.IS_OWN_ACCOUNT === false;

  function renderDecisions() {
    const list = document.getElementById('decisions-list');
    if (!decisions.length) {
      list.innerHTML = '<div class="card" style="padding:32px;text-align:center;color:var(--text3);font-size:14px;">No decisions logged yet. Use the checker above to log your first one.</div>';
      return;
    }
    list.innerHTML = decisions.map((d, idx) => {
      const scoreBadge = d.score >= 5 ? 'badge-green' : d.score >= 3 ? 'badge-amber' : 'badge-red';
      const decBadge   = d.decision === 'bought' ? 'badge-green' : d.decision === 'waited' ? 'badge-amber' : 'badge-red';
      const decLabel   = d.decision === 'bought' ? 'Bought' : d.decision === 'waited' ? 'Waited' : 'Skipped';
      const isOpen     = openDecision === d.id;
      const cCount     = d.comments.length;

      const commentsHtml = d.comments.map(c => `
        <div class="comment">
          <div class="comment-meta">
            <span class="comment-author">💬 ${c.author}</span>
            <span class="comment-date">${c.date}</span>
          </div>
          <div class="comment-text">${c.text}</div>
        </div>`).join('');

      const addCommentHtml = `
        <div class="add-comment">
          <textarea id="comment-input-${d.id}" placeholder="Add a note or comment on this decision..."></textarea>
          <button class="btn btn-primary btn-sm" onclick="addComment('${d.id}')">Comment</button>
        </div>`;

      return `<div class="decision-card">
        <div class="decision-header" onclick="toggleComments('${d.id}')">
          <div class="decision-meta">
            <div class="decision-name">${d.name}</div>
            <span class="badge badge-gray">$${d.price.toFixed(2)}</span>
            <span class="badge ${scoreBadge}">${d.score} / 6</span>
            <span class="badge ${decBadge}">${decLabel}</span>
            <span style="font-size:12px;color:var(--text3);">${d.date}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="comment-count ${cCount?'has-comments':''}">💬 ${cCount} comment${cCount!==1?'s':''}</span>
            <span style="color:var(--text3);font-size:13px;">${isOpen?'▲':'▼'}</span>
          </div>
        </div>
        <div class="comment-section ${isOpen?'open':''}">
          ${cCount ? commentsHtml : '<div style="font-size:13px;color:var(--text3);margin-bottom:10px;">No comments yet.</div>'}
          ${addCommentHtml}
        </div>
      </div>`;
    }).join('');
  }

  function toggleComments(id) {
    openDecision = openDecision === id ? null : id;
    renderDecisions();
    if (openDecision) {
      setTimeout(() => {
        const input = document.getElementById(`comment-input-${id}`);
        if (input) input.focus();
      }, 50);
    }
  }

  function addComment(id) {
    const input  = document.getElementById(`comment-input-${id}`);
    const text   = input?.value.trim();
    if (!text) return;
    const today  = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' });
    const author = window.IS_OWN_ACCOUNT === false
      ? (sessionStorage.getItem('viewingUserName') || 'Partner')
      : 'You';
    const d = decisions.find(x => x.id === id);
    if (d) {
      d.comments.push({ author, date: today, text });
      renderDecisions();
      openDecision = id;
      renderDecisions();
    }
  }

  function getScore() {
    let score = 0;
    for (let i = 1; i <= 6; i++) {
      if (document.getElementById('q' + i).checked) score++;
    }
    return score;
  }

  function updateVerdict() {
    const score = getScore();
    const verdict = document.getElementById('verdict');
    verdict.style.display = 'block';
    if (score >= 5) {
      verdict.className = 'verdict go';
      verdict.textContent = `${score}/6 — Looks like a solid purchase. You've thought it through and it fits your situation.`;
    } else if (score >= 3) {
      verdict.className = 'verdict wait';
      verdict.textContent = `${score}/6 — Maybe wait. A few things don't line up yet. Give it 48 hours and check again.`;
    } else {
      verdict.className = 'verdict stop';
      verdict.textContent = `${score}/6 — Pause on this one. Most of the checks didn't pass — this might be an impulse buy.`;
    }
  }

  function logDecision(decision) {
    const name  = document.getElementById('item-name').value.trim() || 'Unnamed item';
    const price = parseFloat(document.getElementById('item-price').value) || 0;
    const score = getScore();
    const today = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' });
    decisions.unshift({ id: 'd' + Date.now(), name, price, score, decision, date: today, comments: [] });
    renderDecisions();
    document.getElementById('item-name').value = '';
    document.getElementById('item-price').value = '';
    for (let i = 1; i <= 6; i++) document.getElementById('q' + i).checked = false;
    document.getElementById('verdict').style.display = 'none';
  }

  // Hide the active checker if viewing someone else's account
  document.addEventListener('DOMContentLoaded', () => {
    if (window.IS_OWN_ACCOUNT === false) {
      const checkerCard = document.querySelector('.checker-card');
      if (checkerCard) {
        checkerCard.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text2);">👁 You are viewing in read-only mode. You can comment on decisions below.</div>';
      }
    }
    renderDecisions();
  });

  renderDecisions();
</script>


</body>
</html>
