<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — BudgetWise</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // The UMD build exposes itself as window.supabase
    console.log('Supabase loaded:', typeof window.supabase, typeof window.supabasejs);
  </script>
  <script src="supabase.js"></script>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
    .auth-wrap { width: 100%; max-width: 420px; padding: 24px; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo h1 { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--green); }
    .auth-logo p { font-size: 14px; color: var(--text2); margin-top: 4px; }
    .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow-md); }
    .tab-row { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab-btn { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .auth-btn { width: 100%; padding: 12px; background: var(--green); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 8px; }
    .auth-btn:hover { opacity: 0.88; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { font-size: 13px; padding: 10px 14px; border-radius: var(--radius-sm); margin-top: 12px; display: none; }
    .msg.error   { background: var(--red-l);   color: var(--red);   border: 1px solid #f5bbb4; }
    .msg.success { background: var(--green-l); color: var(--green); border: 1px solid var(--green-m); }
    .forgot-link { text-align: right; margin-top: -8px; margin-bottom: 12px; }
    .forgot-link a { font-size: 12px; color: var(--text2); text-decoration: none; cursor: pointer; }
    .invite-box { background: var(--green-l); border: 1px solid var(--green-m); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: #2a5c3f; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <h1>🌿 BudgetWise</h1>
    <p>Your personal finance tracker</p>
  </div>

  <div class="invite-box" id="invite-box"></div>

  <div class="auth-card">
    <!-- Tabs -->
    <div class="tab-row">
      <button class="tab-btn active" id="tab-signin" onclick="showPanel('signin')">Sign in</button>
      <button class="tab-btn"        id="tab-signup" onclick="showPanel('signup')">Create account</button>
      <button class="tab-btn"        id="tab-forgot" onclick="showPanel('forgot')" style="display:none;">Reset password</button>
    </div>

    <!-- Sign in panel -->
    <div class="auth-panel active" id="panel-signin">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="si-password" placeholder="Your password">
      </div>
      <div class="forgot-link"><a onclick="showPanel('forgot')">Forgot password?</a></div>
      <button class="auth-btn" id="si-btn" onclick="doSignIn()">Sign in</button>
      <div class="msg" id="si-msg"></div>
    </div>

    <!-- Sign up panel -->
    <div class="auth-panel" id="panel-signup">
      <div class="form-group">
        <label>Your name</label>
        <input type="text" id="su-name" placeholder="e.g. Brandon">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="su-password" placeholder="At least 8 characters">
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="su-confirm" placeholder="Repeat password">
      </div>
      <button class="auth-btn" id="su-btn" onclick="doSignUp()">Create account</button>
      <div class="msg" id="su-msg"></div>
    </div>

    <!-- Forgot password panel -->
    <div class="auth-panel" id="panel-forgot">
      <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">Enter your email and we'll send a reset link.</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="fp-email" placeholder="you@email.com">
      </div>
      <button class="auth-btn" onclick="doReset()">Send reset link</button>
      <div class="msg" id="fp-msg"></div>
      <div style="text-align:center;margin-top:14px;">
        <a onclick="showPanel('signin')" style="font-size:13px;color:var(--text2);cursor:pointer;">Back to sign in</a>
      </div>
    </div>
  </div>
</div>

<script>
  // Tab switcher — simple and global, no wrapping needed
  function showPanel(name) {
    ['signin','signup','forgot'].forEach(function(p) {
      var panel = document.getElementById('panel-' + p);
      var tab   = document.getElementById('tab-' + p);
      if (panel) panel.classList.toggle('active', p === name);
      if (tab)   tab.classList.toggle('active',   p === name);
    });
  }

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    el.textContent  = text;
    el.className    = 'msg ' + type;
    el.style.display = 'block';
  }

  // Init Supabase immediately — not inside DOMContentLoaded
  var db = (window.supabase || window.supabasejs).createClient(SUPABASE_URL, SUPABASE_KEY);

  document.addEventListener('DOMContentLoaded', function() {

    // Check if already logged in
    db.auth.getSession().then(function(res) {
      if (res.data && res.data.session) {
        window.location.href = 'index.html';
      }
    });

    // Check for invite in URL
    var params    = new URLSearchParams(window.location.search);
    var token     = params.get('invite');
    var fromName  = params.get('from');
    if (token && fromName) {
      var box = document.getElementById('invite-box');
      box.style.display = 'block';
      box.textContent   = decodeURIComponent(fromName) + ' has invited you as an accountability partner!';
      showPanel('signup');
      localStorage.setItem('pendingInvite', token);
    }
  });

  function doSignIn() {
    var email    = document.getElementById('si-email').value.trim();
    var password = document.getElementById('si-password').value;
    var btn      = document.getElementById('si-btn');
    if (!email || !password) { showMsg('si-msg', 'Please fill in all fields.', 'error'); return; }
    btn.disabled    = true;
    btn.textContent = 'Signing in...';
    db.auth.signInWithPassword({ email: email, password: password }).then(function(res) {
      if (res.error) {
        showMsg('si-msg', res.error.message, 'error');
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      } else {
        window.location.href = 'index.html';
      }
    });
  }

  function doSignUp() {
    var name     = document.getElementById('su-name').value.trim();
    var email    = document.getElementById('su-email').value.trim();
    var password = document.getElementById('su-password').value;
    var confirm  = document.getElementById('su-confirm').value;
    var btn      = document.getElementById('su-btn');
    console.log('doSignUp called', { name, email, db: !!db });
    if (!name || !email || !password) { showMsg('su-msg', 'Please fill in all fields.', 'error'); return; }
    if (password !== confirm)         { showMsg('su-msg', 'Passwords do not match.', 'error'); return; }
    if (password.length < 8)          { showMsg('su-msg', 'Password must be at least 8 characters.', 'error'); return; }
    if (!db) { showMsg('su-msg', 'Connection error — please refresh the page.', 'error'); return; }
    btn.disabled    = true;
    btn.textContent = 'Creating account...';
    console.log('Calling db.auth.signUp...');
    db.auth.signUp({
      email: email,
      password: password,
      options: { data: { full_name: name } }
    }).then(function(res) {
      console.log('signUp response:', res);
      if (res.error) {
        showMsg('su-msg', res.error.message, 'error');
        btn.disabled    = false;
        btn.textContent = 'Create account';
      } else {
        var pending = localStorage.getItem('pendingInvite');
        if (pending && res.data.user) {
          db.from('accountability_links')
            .update({ partner_user_id: res.data.user.id, status: 'active' })
            .eq('invite_token', pending)
            .then(function() { localStorage.removeItem('pendingInvite'); });
        }
        showMsg('su-msg', 'Account created! You can now sign in.', 'success');
        btn.disabled    = false;
        btn.textContent = 'Create account';
        setTimeout(function() { showPanel('signin'); }, 2000);
      }
    }).catch(function(err) {
      console.error('signUp error:', err);
      showMsg('su-msg', 'Error: ' + err.message, 'error');
      btn.disabled    = false;
      btn.textContent = 'Create account';
    });
  }

  function doReset() {
    var email = document.getElementById('fp-email').value.trim();
    if (!email) { showMsg('fp-msg', 'Please enter your email.', 'error'); return; }
    db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    }).then(function(res) {
      if (res.error) {
        showMsg('fp-msg', res.error.message, 'error');
      } else {
        showMsg('fp-msg', 'Reset link sent — check your email!', 'success');
      }
    });
  }
</script>

</body>
</html>
