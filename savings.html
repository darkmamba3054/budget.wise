<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Goals — CheckMate Budget</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth-guard.js"></script>
  
</head>
<body>

<script src="nav.js"></script>

<div class="page">
  <div class="page-header">
    <h1>Savings Goals</h1>
    <p>Set a target, track your progress, get there.</p>
  </div>

  <!-- Add goal form -->
  <div class="card" style="margin-bottom:24px;">
    <div class="section-header" style="margin-bottom:20px;">
      <h2>Add a savings goal</h2>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Goal name</label>
        <input type="text" id="goal-name" placeholder="e.g. Emergency fund">
      </div>
      <div class="form-group">
        <label>Target amount ($)</label>
        <input type="number" id="goal-target" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount saved so far ($)</label>
        <input type="number" id="goal-saved" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Target date</label>
        <input type="date" id="goal-date">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addGoal()">Add goal</button>
  </div>

  <!-- Goals list -->
  <div class="section-header">
    <h2>Your goals</h2>
  </div>
  <div id="goals-list" style="display:flex; flex-direction:column; gap:16px;"></div>

<script>
  var db = (window.supabase || window.supabasejs).createClient(SUPABASE_URL, SUPABASE_KEY);
  var currentUser = null;

  document.addEventListener('DOMContentLoaded', function() {
    db.auth.getSession().then(function(res) {
      if (!res.data || !res.data.session) { window.location.replace('login.html'); return; }
      currentUser = res.data.session.user;
      loadGoals();
    });
  });

  function loadGoals() {
    db.from('savings_goals').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true })
      .then(function(res) {
        var goals = res.data || [];
        var list  = document.getElementById('goals-list');
        if (!goals.length) {
          list.innerHTML = '<div class="card" style="padding:32px;text-align:center;color:var(--text3);font-size:14px;">No savings goals yet — add your first goal above.</div>';
          return;
        }
        list.innerHTML = goals.map(function(g) {
          var pct       = Math.min(100, Math.round((g.saved / g.target) * 100));
          var rem       = Math.max(0, g.target - g.saved);
          var color     = pct >= 75 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';
          var fillClass = pct >= 75 ? '' : pct >= 40 ? 'amber' : 'red';
          var dateStr   = g.target_date ? new Date(g.target_date + 'T00:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}) : 'No target date';

          // Other goals for transfer dropdown
          var otherGoals = goals.filter(function(o){ return o.id !== g.id; });
          var transferOpts = otherGoals.length
            ? otherGoals.map(function(o){ return '<option value="' + o.id + '|' + o.saved + '">' + o.name + '</option>'; }).join('')
            : '<option value="">No other goals</option>';

          return '<div class="card goal-card" data-id="' + g.id + '">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">' +
              '<div><div style="font-weight:600;font-size:16px;margin-bottom:2px;">' + g.name + '</div><div style="font-size:13px;color:var(--text2);">Target: ' + dateStr + '</div></div>' +
              '<div style="text-align:right;">' +
                '<div style="font-family:DM Serif Display,serif;font-size:22px;color:' + color + ';">$' + parseFloat(g.saved).toLocaleString() + '</div>' +
                '<div style="font-size:13px;color:var(--text2);">of $' + parseFloat(g.target).toLocaleString() + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="progress-track" style="margin-bottom:8px;"><div class="progress-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>' +
            '<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:14px;"><span>' + pct + '% there</span><span>$' + rem.toLocaleString() + ' to go</span></div>' +
            '<div style="border-top:1px solid var(--border);padding-top:14px;margin-bottom:12px;">' +
              '<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Add money</div>' +
              '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">' +
                '<input type="number" placeholder="Amount ($)" id="add-' + g.id + '" style="padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);width:130px;font-family:DM Sans,sans-serif;">' +
                '<button class="btn btn-primary btn-sm" onclick="addToGoal(\'' + g.id + '\',' + g.saved + ')">+ Add</button>' +
              '</div>' +
            '</div>' +
            '<div style="border-top:1px solid var(--border);padding-top:14px;">' +
              '<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Transfer to another goal</div>' +
              '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">' +
                '<input type="number" placeholder="Amount ($)" id="transfer-amt-' + g.id + '" style="padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);width:130px;font-family:DM Sans,sans-serif;">' +
                '<select id="transfer-to-' + g.id + '" style="padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:DM Sans,sans-serif;">' +
                  transferOpts +
                '</select>' +
                '<button class="btn btn-outline btn-sm" onclick="transferGoal(\'' + g.id + '\',' + g.saved + ')" ' + (!otherGoals.length?'disabled':'') + '>Transfer</button>' +
              '</div>' +
            '</div>' +
            '<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);text-align:right;">' +
              '<button class="btn btn-danger btn-sm" onclick="deleteGoal(\'' + g.id + '\')">Remove goal</button>' +
            '</div>' +
          '</div>';
        }).join('');
      });
  }

  function addGoal() {
    var name   = document.getElementById('goal-name').value.trim();
    var target = parseFloat(document.getElementById('goal-target').value) || 0;
    var saved  = parseFloat(document.getElementById('goal-saved').value) || 0;
    var date   = document.getElementById('goal-date').value || null;
    if (!name || !target) { alert('Please enter a name and target amount.'); return; }
    db.from('savings_goals').insert({ user_id:currentUser.id, name:name, target:target, saved:saved, target_date:date }).select()
      .then(function(res) {
        if (res.error) { alert('Error: ' + res.error.message); return; }
        document.getElementById('goal-name').value   = '';
        document.getElementById('goal-target').value = '';
        document.getElementById('goal-saved').value  = '';
        document.getElementById('goal-date').value   = '';
        setTimeout(function() { loadGoals(); }, 300);
      });
  }

  function addToGoal(id, currentSaved) {
    var input  = document.getElementById('add-' + id);
    var amount = parseFloat(input.value) || 0;
    if (!amount) return;
    db.from('savings_goals').update({ saved: currentSaved + amount }).eq('id', id)
      .then(function(res) {
        if (res.error) { alert('Error: ' + res.error.message); return; }
        setTimeout(function() { loadGoals(); }, 300);
      });
  }

  function transferGoal(fromId, fromSaved) {
    var amtInput = document.getElementById('transfer-amt-' + fromId);
    var toSelect = document.getElementById('transfer-to-' + fromId);
    var amount   = parseFloat(amtInput.value) || 0;
    if (!amount) { alert('Enter an amount to transfer.'); return; }
    if (amount > fromSaved) { alert('You can\'t transfer more than what\'s saved in this goal ($' + fromSaved + ').'); return; }
    var parts   = toSelect.value.split('|');
    var toId    = parts[0];
    var toSaved = parseFloat(parts[1]) || 0;
    if (!toId) { alert('Please select a goal to transfer to.'); return; }

    // Subtract from source, add to destination
    db.from('savings_goals').update({ saved: fromSaved - amount }).eq('id', fromId)
      .then(function(res) {
        if (res.error) { alert('Error: ' + res.error.message); return; }
        db.from('savings_goals').update({ saved: toSaved + amount }).eq('id', toId)
          .then(function(res2) {
            if (res2.error) { alert('Error: ' + res2.error.message); return; }
            setTimeout(function() { loadGoals(); }, 300);
          });
      });
  }
    if (!confirm('Remove this savings goal?')) return;
    db.from('savings_goals').delete().eq('id', id).then(function(res) { if (res.error) { alert('Error: ' + res.error.message); return; } setTimeout(function() { loadGoals(); }, 300); });
  }
</script>

</body>
</html>
