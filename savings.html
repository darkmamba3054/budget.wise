<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Goals — CheckMate Budget</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth-guard.js"></script>
</head>
<body>

<script src="nav.js"></script>

<div class="page">
  <div class="page-header">
    <h1>Savings Goals</h1>
    <p>Set a target, track your progress, get there.</p>
  </div>

  <div class="card" style="margin-bottom:24px;">
    <div class="section-header" style="margin-bottom:20px;">
      <h2>Add a savings goal</h2>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Goal name</label>
        <input type="text" id="goal-name" placeholder="e.g. Emergency fund">
      </div>
      <div class="form-group">
        <label>Target amount ($)</label>
        <input type="number" id="goal-target" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount saved so far ($)</label>
        <input type="number" id="goal-saved" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Target date</label>
        <input type="date" id="goal-date">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addGoal()">Add goal</button>
    <div id="add-msg" style="font-size:13px;margin-top:8px;display:none;"></div>
  </div>

  <div class="section-header">
    <h2>Your goals</h2>
  </div>
  <div id="goals-list" style="display:flex;flex-direction:column;gap:16px;"></div>
</div>

<script>
var db = (window.supabase || window.supabasejs).createClient(SUPABASE_URL, SUPABASE_KEY);
var currentUser = null;
var allGoals = [];

document.addEventListener('DOMContentLoaded', function() {
  db.auth.getSession().then(function(res) {
    if (!res.data || !res.data.session) { window.location.replace('login.html'); return; }
    currentUser = res.data.session.user;
    loadGoals();
  });
});

function loadGoals() {
  db.from('savings_goals').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true })
    .then(function(res) {
      if (res.error) { console.error('Load error:', res.error); return; }
      allGoals = res.data || [];
      renderGoals();
    });
}

function renderGoals() {
  var list = document.getElementById('goals-list');
  if (!allGoals.length) {
    list.innerHTML = '<div class="card" style="padding:32px;text-align:center;color:var(--text3);font-size:14px;">No savings goals yet — add your first goal above.</div>';
    return;
  }

  list.innerHTML = '';
  allGoals.forEach(function(g, idx) {
    var pct       = g.target > 0 ? Math.min(100, Math.round((g.saved / g.target) * 100)) : 0;
    var rem       = Math.max(0, g.target - g.saved);
    var color     = pct >= 75 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';
    var fillClass = pct >= 75 ? '' : pct >= 40 ? 'amber' : 'red';
    var dateStr   = g.target_date ? new Date(g.target_date + 'T00:00:00').toLocaleDateString('en-US', {month:'short', year:'numeric'}) : 'No target date';

    var card = document.createElement('div');
    card.className = 'card';
    card.style.padding = '20px';

    // Header
    var header = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">';
    header    += '<div><div style="font-weight:600;font-size:16px;margin-bottom:2px;">' + g.name + '</div>';
    header    += '<div style="font-size:13px;color:var(--text2);">Target: ' + dateStr + '</div></div>';
    header    += '<div style="text-align:right;"><div style="font-size:22px;font-weight:700;color:' + color + ';">$' + parseFloat(g.saved).toLocaleString() + '</div>';
    header    += '<div style="font-size:13px;color:var(--text2);">of $' + parseFloat(g.target).toLocaleString() + '</div></div></div>';

    // Progress
    var progress  = '<div class="progress-track" style="margin-bottom:8px;"><div class="progress-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>';
    progress     += '<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:16px;">';
    progress     += '<span>' + pct + '% there</span><span>$' + rem.toLocaleString() + ' to go</span></div>';

    // Add money
    var addSection  = '<div style="border-top:1px solid var(--border);padding-top:14px;margin-bottom:14px;">';
    addSection     += '<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Add money</div>';
    addSection     += '<div style="display:flex;gap:8px;align-items:center;">';
    addSection     += '<input type="number" id="add-' + g.id + '" placeholder="Amount ($)" min="0" step="0.01" style="padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);width:140px;font-family:DM Sans,sans-serif;">';
    addSection     += '<button class="btn btn-primary btn-sm" onclick="addToGoal(\'' + g.id + '\',' + g.saved + ')">+ Add</button>';
    addSection     += '</div></div>';

    // Transfer
    var otherGoals = allGoals.filter(function(o) { return o.id !== g.id; });
    var opts = otherGoals.length
      ? otherGoals.map(function(o) { return '<option value="' + o.id + '|' + o.saved + '">' + o.name + '</option>'; }).join('')
      : '<option value="">No other goals yet</option>';

    var transferSection  = '<div style="border-top:1px solid var(--border);padding-top:14px;margin-bottom:14px;">';
    transferSection     += '<div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;">Transfer to another goal</div>';
    transferSection     += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">';
    transferSection     += '<input type="number" id="xfer-amt-' + g.id + '" placeholder="Amount ($)" min="0" step="0.01" style="padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);width:140px;font-family:DM Sans,sans-serif;">';
    transferSection     += '<select id="xfer-to-' + g.id + '" style="padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:DM Sans,sans-serif;">' + opts + '</select>';
    transferSection     += '<button class="btn btn-outline btn-sm" ' + (!otherGoals.length ? 'disabled' : '') + ' onclick="transferGoal(\'' + g.id + '\',' + g.saved + ')">Transfer</button>';
    transferSection     += '</div></div>';

    // Remove
    var footer = '<div style="border-top:1px solid var(--border);padding-top:14px;text-align:right;">';
    footer    += '<button class="btn btn-sm" style="background:var(--red-l);color:var(--red);border:none;" onclick="deleteGoal(\'' + g.id + '\')">Remove goal</button>';
    footer    += '</div>';

    card.innerHTML = header + progress + addSection + transferSection + footer;
    list.appendChild(card);
  });
}

function addGoal() {
  var name   = document.getElementById('goal-name').value.trim();
  var target = parseFloat(document.getElementById('goal-target').value) || 0;
  var saved  = parseFloat(document.getElementById('goal-saved').value) || 0;
  var date   = document.getElementById('goal-date').value || null;
  var msg    = document.getElementById('add-msg');

  if (!name || !target) { msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent='Please enter a name and target amount.'; return; }

  db.from('savings_goals').insert({
    user_id:     currentUser.id,
    name:        name,
    target:      target,
    saved:       saved,
    target_date: date
  }).select().then(function(res) {
    if (res.error) { msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent='Error: ' + res.error.message; return; }
    document.getElementById('goal-name').value   = '';
    document.getElementById('goal-target').value = '';
    document.getElementById('goal-saved').value  = '';
    document.getElementById('goal-date').value   = '';
    msg.style.display = 'none';
    setTimeout(loadGoals, 300);
  });
}

function addToGoal(id, currentSaved) {
  var input  = document.getElementById('add-' + id);
  var amount = parseFloat(input.value) || 0;
  if (!amount) { alert('Please enter an amount.'); return; }
  db.from('savings_goals').update({ saved: currentSaved + amount }).eq('id', id)
    .then(function(res) {
      if (res.error) { alert('Error: ' + res.error.message); return; }
      input.value = '';
      setTimeout(loadGoals, 300);
    });
}

function transferGoal(fromId, fromSaved) {
  var amtEl  = document.getElementById('xfer-amt-' + fromId);
  var toEl   = document.getElementById('xfer-to-' + fromId);
  var amount = parseFloat(amtEl.value) || 0;
  if (!amount) { alert('Please enter an amount to transfer.'); return; }
  if (amount > fromSaved) { alert("You can't transfer more than what's saved ($" + fromSaved + ').'); return; }
  var parts   = toEl.value.split('|');
  var toId    = parts[0];
  var toSaved = parseFloat(parts[1]) || 0;
  if (!toId) { alert('Please select a goal to transfer to.'); return; }

  db.from('savings_goals').update({ saved: fromSaved - amount }).eq('id', fromId)
    .then(function(res) {
      if (res.error) { alert('Error: ' + res.error.message); return; }
      db.from('savings_goals').update({ saved: toSaved + amount }).eq('id', toId)
        .then(function(res2) {
          if (res2.error) { alert('Error: ' + res2.error.message); return; }
          amtEl.value = '';
          setTimeout(loadGoals, 300);
        });
    });
}

function deleteGoal(id) {
  if (!confirm('Remove this savings goal?')) return;
  db.from('savings_goals').delete().eq('id', id)
    .then(function(res) {
      if (res.error) { alert('Error: ' + res.error.message); return; }
      setTimeout(loadGoals, 300);
    });
}
</script>

</body>
</html>
