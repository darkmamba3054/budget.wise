<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Goals — CheckMate Budget</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth-guard.js"></script>
  
</head>
<body>

<script src="nav.js"></script>

<div class="page">
  <div class="page-header">
    <h1>Savings Goals</h1>
    <p>Set a target, track your progress, get there.</p>
  </div>

  <!-- Add goal form -->
  <div class="card" style="margin-bottom:24px;">
    <div class="section-header" style="margin-bottom:20px;">
      <h2>Add a savings goal</h2>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Goal name</label>
        <input type="text" id="goal-name" placeholder="e.g. Emergency fund">
      </div>
      <div class="form-group">
        <label>Target amount ($)</label>
        <input type="number" id="goal-target" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount saved so far ($)</label>
        <input type="number" id="goal-saved" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Target date</label>
        <input type="date" id="goal-date">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addGoal()">Add goal</button>
  </div>

  <!-- Goals list -->
  <div class="section-header">
    <h2>Your goals</h2>
  </div>
  <div id="goals-list" style="display:flex; flex-direction:column; gap:16px;"></div>

<script>
  var db = (window.supabase || window.supabasejs).createClient(SUPABASE_URL, SUPABASE_KEY);
  var currentUser = null;

  document.addEventListener('DOMContentLoaded', function() {
    db.auth.getSession().then(function(res) {
      if (!res.data || !res.data.session) { window.location.replace('login.html'); return; }
      currentUser = res.data.session.user;
      loadGoals();
    });
  });

  function loadGoals() {
    db.from('savings_goals').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: true })
      .then(function(res) {
        var goals = res.data || [];
        var list  = document.getElementById('goals-list');
        if (!goals.length) {
          list.innerHTML = '<div class="card" style="padding:32px;text-align:center;color:var(--text3);font-size:14px;">No savings goals yet — add your first goal above.</div>';
          return;
        }
        list.innerHTML = goals.map(function(g) {
          var pct  = Math.min(100, Math.round((g.saved / g.target) * 100));
          var rem  = Math.max(0, g.target - g.saved);
          var color = pct >= 75 ? 'var(--green)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';
          var fillClass = pct >= 75 ? '' : pct >= 40 ? 'amber' : 'red';
          var dateStr = g.target_date ? new Date(g.target_date + 'T00:00:00').toLocaleDateString('en-US',{month:'short',year:'numeric'}) : 'No target date';
          return '<div class="card goal-card" data-id="' + g.id + '">' +
            '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">' +
              '<div><div style="font-weight:600;font-size:16px;margin-bottom:2px;">' + g.name + '</div><div style="font-size:13px;color:var(--text2);">Target: ' + dateStr + '</div></div>' +
              '<div style="text-align:right;"><div style="font-family:'DM Serif Display',serif;font-size:22px;color:' + color + ';">$' + parseFloat(g.saved).toLocaleString() + '</div><div style="font-size:13px;color:var(--text2);">of $' + parseFloat(g.target).toLocaleString() + '</div></div>' +
            '</div>' +
            '<div class="progress-track" style="margin-bottom:8px;"><div class="progress-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>' +
            '<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text2);"><span>' + pct + '% there</span><span>$' + rem.toLocaleString() + ' to go</span></div>' +
            '<div style="margin-top:14px;display:flex;gap:8px;align-items:center;">' +
              '<input type="number" placeholder="Add amount ($)" id="add-' + g.id + '" style="padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);width:160px;font-family:'DM Sans',sans-serif;">' +
              '<button class="btn btn-outline btn-sm" onclick="addToGoal('' + g.id + '',' + g.saved + ')">Add to goal</button>' +
              '<button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="deleteGoal('' + g.id + '')">Remove</button>' +
            '</div>' +
          '</div>';
        }).join('');
      });
  }

  function addGoal() {
    var name   = document.getElementById('goal-name').value.trim();
    var target = parseFloat(document.getElementById('goal-target').value) || 0;
    var saved  = parseFloat(document.getElementById('goal-saved').value) || 0;
    var date   = document.getElementById('goal-date').value || null;
    if (!name || !target) { alert('Please enter a name and target amount.'); return; }
    db.from('savings_goals').insert({ user_id:currentUser.id, name:name, target:target, saved:saved, target_date:date })
      .then(function(res) {
        if (res.error) { alert('Error: ' + res.error.message); return; }
        document.getElementById('goal-name').value   = '';
        document.getElementById('goal-target').value = '';
        document.getElementById('goal-saved').value  = '';
        document.getElementById('goal-date').value   = '';
        loadGoals();
      });
  }

  function addToGoal(id, currentSaved) {
    var input  = document.getElementById('add-' + id);
    var amount = parseFloat(input.value) || 0;
    if (!amount) return;
    db.from('savings_goals').update({ saved: currentSaved + amount }).eq('id', id)
      .then(function(res) {
        if (res.error) { alert('Error: ' + res.error.message); return; }
        setTimeout(function() { loadGoals(); }, 300);
      });
  }

  function deleteGoal(id) {
    if (!confirm('Remove this savings goal?')) return;
    db.from('savings_goals').delete().eq('id', id).then(function(res) { if (res.error) { alert('Error: ' + res.error.message); return; } setTimeout(function() { loadGoals(); }, 300); });
  }
</script>

</body>
</html>
