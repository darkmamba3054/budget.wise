<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savings Goals — BudgetWise</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="auth-guard.js"></script>
</head>
<body>

<script src="nav.js"></script>

<div class="page">
  <div class="page-header">
    <h1>Savings Goals</h1>
    <p>Set a target, track your progress, get there.</p>
  </div>

  <!-- Add goal form -->
  <div class="card" style="margin-bottom:24px;">
    <div class="section-header" style="margin-bottom:20px;">
      <h2>Add a savings goal</h2>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Goal name</label>
        <input type="text" id="goal-name" placeholder="e.g. Emergency fund">
      </div>
      <div class="form-group">
        <label>Target amount ($)</label>
        <input type="number" id="goal-target" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount saved so far ($)</label>
        <input type="number" id="goal-saved" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Target date</label>
        <input type="date" id="goal-date">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addGoal()">Add goal</button>
  </div>

  <!-- Goals list -->
  <div class="section-header">
    <h2>Your goals</h2>
  </div>
  <div id="goals-list" style="display:flex; flex-direction:column; gap:16px;">

    <div class="card goal-card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
        <div>
          <div style="font-weight:600; font-size:16px; margin-bottom:2px;">Emergency Fund</div>
          <div style="font-size:13px; color:var(--text2);">Target: Dec 2026</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'DM Serif Display',serif; font-size:22px; color:var(--green);">$1,200</div>
          <div style="font-size:13px; color:var(--text2);">of $3,000</div>
        </div>
      </div>
      <div class="progress-track" style="margin-bottom:8px;">
        <div class="progress-fill" style="width:40%"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--text2);">
        <span>40% there</span>
        <span>$1,800 to go</span>
      </div>
      <div style="margin-top:14px; display:flex; gap:8px; align-items:center;">
        <input type="number" placeholder="Add amount ($)" style="padding:8px 12px; font-size:13px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); width:160px; font-family:'DM Sans',sans-serif;">
        <button class="btn btn-outline btn-sm">Add to goal</button>
        <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="deleteGoal(this)">Remove</button>
      </div>
    </div>

    <div class="card goal-card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
        <div>
          <div style="font-weight:600; font-size:16px; margin-bottom:2px;">Vacation — Italy</div>
          <div style="font-size:13px; color:var(--text2);">Target: Aug 2026</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'DM Serif Display',serif; font-size:22px; color:var(--amber);">$800</div>
          <div style="font-size:13px; color:var(--text2);">of $2,500</div>
        </div>
      </div>
      <div class="progress-track" style="margin-bottom:8px;">
        <div class="progress-fill amber" style="width:32%"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--text2);">
        <span>32% there</span>
        <span>$1,700 to go</span>
      </div>
      <div style="margin-top:14px; display:flex; gap:8px; align-items:center;">
        <input type="number" placeholder="Add amount ($)" style="padding:8px 12px; font-size:13px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); width:160px; font-family:'DM Sans',sans-serif;">
        <button class="btn btn-outline btn-sm">Add to goal</button>
        <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="deleteGoal(this)">Remove</button>
      </div>
    </div>

  </div>
</div>

<script>
  function addGoal() {
    const name   = document.getElementById('goal-name').value.trim();
    const target = parseFloat(document.getElementById('goal-target').value) || 0;
    const saved  = parseFloat(document.getElementById('goal-saved').value) || 0;
    const date   = document.getElementById('goal-date').value;

    if (!name || !target) { alert('Please enter a name and target amount.'); return; }

    const pct = Math.min(100, Math.round((saved / target) * 100));
    const remaining = Math.max(0, target - saved);
    const color = pct >= 75 ? '' : pct >= 40 ? 'amber' : 'red';
    const dateStr = date ? new Date(date + 'T00:00:00').toLocaleDateString('en-US', { month:'short', year:'numeric' }) : 'No target date';

    const card = document.createElement('div');
    card.className = 'card goal-card';
    card.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
        <div>
          <div style="font-weight:600; font-size:16px; margin-bottom:2px;">${name}</div>
          <div style="font-size:13px; color:var(--text2);">Target: ${dateStr}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'DM Serif Display',serif; font-size:22px; color:var(--${color || 'green'});">$${saved.toLocaleString()}</div>
          <div style="font-size:13px; color:var(--text2);">of $${target.toLocaleString()}</div>
        </div>
      </div>
      <div class="progress-track" style="margin-bottom:8px;">
        <div class="progress-fill ${color}" style="width:${pct}%"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:13px; color:var(--text2);">
        <span>${pct}% there</span>
        <span>$${remaining.toLocaleString()} to go</span>
      </div>
      <div style="margin-top:14px; display:flex; gap:8px; align-items:center;">
        <input type="number" placeholder="Add amount ($)" style="padding:8px 12px; font-size:13px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); width:160px; font-family:'DM Sans',sans-serif;">
        <button class="btn btn-outline btn-sm">Add to goal</button>
        <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="deleteGoal(this)">Remove</button>
      </div>
    `;
    document.getElementById('goals-list').appendChild(card);

    document.getElementById('goal-name').value = '';
    document.getElementById('goal-target').value = '';
    document.getElementById('goal-saved').value = '';
    document.getElementById('goal-date').value = '';
  }

  function deleteGoal(btn) { btn.closest('.goal-card').remove(); }
</script>

</body>
</html>
