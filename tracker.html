<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YTD Tracker — CheckMate Budget</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth-guard.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    .tab-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .tab { padding: 5px 12px; border-radius: 99px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text2); font-family: 'DM Sans', sans-serif; }
    .tab.active { background: var(--green); color: white; border-color: var(--green); }
    .chart-wrap { padding: 16px; height: 240px; position: relative; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { text-align: right; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; padding: 9px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--bg); }
    thead th:first-child { text-align: left; min-width: 140px; position: sticky; left: 0; background: var(--bg); z-index: 1; }
    tbody td { padding: 9px 10px; border-bottom: 1px solid var(--bg2); text-align: right; color: var(--text); }
    tbody td:first-child { text-align: left; font-weight: 500; position: sticky; left: 0; background: var(--card); z-index: 1; }
    tbody tr:hover td { background: var(--bg); }
    tbody tr:hover td:first-child { background: var(--bg); }
    .total-row td { font-weight: 700; background: var(--bg) !important; border-top: 1px solid var(--border) !important; }
    .section-div td { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; background: var(--bg2) !important; padding: 6px 10px; }
    .up   { color: var(--red);   }
    .down { color: var(--green); }
    .neut { color: var(--text3); }
    .inc-up { color: var(--green); }
    .ytd-col { font-weight: 700; background: var(--green-l) !important; color: var(--green) !important; }
    .ytd-col-neg { font-weight: 700; background: var(--red-l) !important; color: var(--red) !important; }
  </style>
</head>
<body>
<script src="nav.js"></script>
<script src="session.js"></script>
<div class="page">
  <div class="page-header">
    <h1>YTD Tracker</h1>
    <p>Year to date totals and month over month changes for income, bills, and spending.</p>
  </div>

  <div class="grid-3" style="margin-bottom:20px;" id="top-stats"></div>

  <div class="card" style="margin-bottom:20px;">
    <div class="section-header">
      <h2>Year overview — 2026</h2>
      <div class="tab-row" id="chart-tabs"></div>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <div class="card">
    <div class="section-header">
      <h2>Month over month breakdown</h2>
      <span style="font-size:12px; color:var(--text3);">↑ increased &nbsp; ↓ decreased vs prior month</span>
    </div>
    <div class="table-wrap" id="table-wrap"></div>
  </div>
</div>

<script>
  var db = (window.supabase || window.supabasejs).createClient(SUPABASE_URL, SUPABASE_KEY);
  var currentUser = null;
  var activeChart = 'all';
  var chartInst   = null;
  var currentYear = new Date().getFullYear();

  // Dynamic months — current year Jan through current month
  var now         = new Date();
  var numMonths   = now.getMonth() + 1; // how many months so far this year
  var monthLabels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].slice(0, numMonths);

  var data = {
    income:   monthLabels.map(function(){ return 0; }),
    bills:    monthLabels.map(function(){ return 0; }),
    spending: monthLabels.map(function(){ return 0; }),
  };

  var billCats  = [];
  var spendCats = [];

  document.addEventListener('DOMContentLoaded', function() {
    db.auth.getSession().then(function(res) {
      if (!res.data || !res.data.session) { window.location.replace('login.html'); return; }
      currentUser = res.data.session.user;
      loadAll();
    });
  });

  function loadAll() {
    Promise.all([
      db.from('paychecks').select('*').eq('user_id', currentUser.id).eq('year', currentYear),
      db.from('bills').select('*').eq('user_id', currentUser.id),
      db.from('expenses').select('*').eq('user_id', currentUser.id).gte('date', currentYear + '-01-01').lte('date', currentYear + '-12-31'),
    ]).then(function(results) {
      var paychecks = results[0].data || [];
      var bills     = results[1].data || [];
      var expenses  = results[2].data || [];

      // Income — sum paychecks per month
      data.income = monthLabels.map(function(_, i) {
        var mo = i + 1;
        return paychecks.filter(function(p){ return p.month === mo; }).reduce(function(s,p){ return s + parseFloat(p.amount); }, 0);
      });

      // Bills — total monthly bills (same each month)
      var monthlyBillTotal = bills.reduce(function(s,b){ return s + parseFloat(b.amount); }, 0);
      data.bills = monthLabels.map(function(){ return monthlyBillTotal; });

      // Bill categories
      var billMap = {};
      bills.forEach(function(b) {
        var name = b.name;
        if (!billMap[name]) billMap[name] = monthLabels.map(function(){ return parseFloat(b.amount); });
      });
      billCats = Object.keys(billMap).map(function(name) {
        return { name:name, vals:billMap[name] };
      });

      // Spending — sum expenses per month per category
      var spendMap = {};
      expenses.forEach(function(e) {
        var mo  = new Date(e.date + 'T00:00:00').getMonth(); // 0-indexed
        if (mo >= numMonths) return;
        var cat = e.category || 'Other';
        if (!spendMap[cat]) spendMap[cat] = monthLabels.map(function(){ return 0; });
        spendMap[cat][mo] += parseFloat(e.amount);
      });

      data.spending = monthLabels.map(function(_, i) {
        return Object.values(spendMap).reduce(function(s, vals){ return s + (vals[i]||0); }, 0);
      });

      spendCats = Object.keys(spendMap).map(function(cat) {
        return { name:cat, vals:spendMap[cat] };
      });

      renderStats();
      renderChart();
      renderTable();
    });
  }

  function fmt(n) { return '$' + Math.round(n).toLocaleString(); }

  function chg(cur, prev, isIncome) {
    if (prev === null) return '<span class="neut">—</span>';
    var d = cur - prev;
    if (d === 0) return '<span class="neut">—</span>';
    if (isIncome) return '<span class="' + (d>0?'inc-up':'up') + '">' + (d>0?'↑':'↓') + ' ' + fmt(Math.abs(d)) + '</span>';
    return '<span class="' + (d>0?'up':'down') + '">' + (d>0?'↑':'↓') + ' ' + fmt(Math.abs(d)) + '</span>';
  }

  function renderStats() {
    var yi = data.income.reduce(function(s,v){ return s+v; }, 0);
    var yb = data.bills.reduce(function(s,v){ return s+v; }, 0);
    var ys = data.spending.reduce(function(s,v){ return s+v; }, 0);
    var yn = yi - yb - ys;
    var lastMo = monthLabels[monthLabels.length-1];
    document.getElementById('top-stats').innerHTML =
      '<div class="card"><div class="card-title">YTD income</div><div class="card-value green">' + fmt(yi) + '</div><div class="card-sub">Jan–' + lastMo + ' ' + currentYear + '</div></div>' +
      '<div class="card"><div class="card-title">YTD bills + spending</div><div class="card-value red">' + fmt(yb+ys) + '</div><div class="card-sub">All outgoing</div></div>' +
      '<div class="card"><div class="card-title">YTD net</div><div class="card-value ' + (yn>=0?'green':'red') + '">' + fmt(yn) + '</div><div class="card-sub">Income minus everything</div></div>';
  }

  function renderChart() {
    document.getElementById('chart-tabs').innerHTML = [
      {key:'all',label:'All'},{key:'income',label:'Income'},{key:'bills',label:'Bills'},{key:'spending',label:'Spending'}
    ].map(function(t){ return '<button class="tab ' + (activeChart===t.key?'active':'') + '" onclick="setChart(\'' + t.key + '\')">' + t.label + '</button>'; }).join('');

    if (chartInst) chartInst.destroy();
    var ds = [];
    if (activeChart==='all'||activeChart==='income')   ds.push({label:'Income',   data:data.income,   backgroundColor:'#3a7d5a', borderRadius:4});
    if (activeChart==='all'||activeChart==='bills')    ds.push({label:'Bills',    data:data.bills,    backgroundColor:'#c0442a', borderRadius:4});
    if (activeChart==='all'||activeChart==='spending') ds.push({label:'Spending', data:data.spending, backgroundColor:'#c97b2e', borderRadius:4});

    chartInst = new Chart(document.getElementById('mainChart').getContext('2d'), {
      type: 'bar',
      data: { labels: monthLabels, datasets: ds },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position:'bottom', labels:{ boxWidth:10, font:{ size:11 } } },
          tooltip: { callbacks: { label: function(c){ return ' ' + fmt(c.raw); } } }
        },
        scales: {
          x: { grid:{ display:false }, border:{ display:false } },
          y: { grid:{ color:'rgba(0,0,0,0.05)' }, border:{ display:false }, ticks:{ callback: function(v){ return '$'+Math.round(v/1000)+'k'; } } }
        }
      }
    });
  }

  function renderTable() {
    var cols = monthLabels.length * 2 + 2;
    var hdr  = monthLabels.map(function(m){ return '<th>' + m + '</th><th>Chg</th>'; }).join('') + '<th>YTD</th>';

    function catRows(cats, isIncome) {
      return cats.map(function(c) {
        var ytd = c.vals.reduce(function(s,v){ return s+v; }, 0);
        return '<tr><td>' + c.name + '</td>' +
          c.vals.map(function(v,i){ return '<td>' + fmt(v) + '</td><td>' + chg(v,i>0?c.vals[i-1]:null,isIncome) + '</td>'; }).join('') +
          '<td style="background:var(--green-l);color:var(--green);font-weight:700;">' + fmt(ytd) + '</td></tr>';
      }).join('');
    }

    function totRow(label, vals, isIncome) {
      var ytd = vals.reduce(function(s,v){ return s+v; }, 0);
      return '<tr class="total-row"><td>' + label + '</td>' +
        vals.map(function(v,i){ return '<td>' + fmt(v) + '</td><td>' + chg(v,i>0?vals[i-1]:null,isIncome) + '</td>'; }).join('') +
        '<td style="background:var(--green-l);color:var(--green);font-weight:700;">' + fmt(ytd) + '</td></tr>';
    }

    var netVals = monthLabels.map(function(_,i){ return data.income[i] - data.bills[i] - data.spending[i]; });
    var netYTD  = netVals.reduce(function(s,v){ return s+v; }, 0);
    var netRow  = '<tr class="total-row"><td>Net (income − all)</td>' +
      netVals.map(function(v,i){ return '<td style="color:' + (v>=0?'var(--green)':'var(--red)') + ';font-weight:700;">' + fmt(v) + '</td><td>' + chg(v,i>0?netVals[i-1]:null,true) + '</td>'; }).join('') +
      '<td style="background:' + (netYTD>=0?'var(--green-l)':'var(--red-l)') + ';color:' + (netYTD>=0?'var(--green)':'var(--red)') + ';font-weight:700;">' + fmt(netYTD) + '</td></tr>';

    var incomeYTD = data.income.reduce(function(s,v){ return s+v; }, 0);
    document.getElementById('table-wrap').innerHTML = '<table>' +
      '<thead><tr><th>Category</th>' + hdr + '</tr></thead>' +
      '<tbody>' +
        '<tr class="section-div"><td colspan="' + cols + '">Income</td></tr>' +
        '<tr><td>Paychecks</td>' + data.income.map(function(v,i){ return '<td>' + fmt(v) + '</td><td>' + chg(v,i>0?data.income[i-1]:null,true) + '</td>'; }).join('') + '<td style="background:var(--green-l);color:var(--green);font-weight:700;">' + fmt(incomeYTD) + '</td></tr>' +
        '<tr class="section-div"><td colspan="' + cols + '">Bills</td></tr>' +
        catRows(billCats, false) + totRow('Bills total', data.bills, false) +
        '<tr class="section-div"><td colspan="' + cols + '">Spending</td></tr>' +
        catRows(spendCats, false) + totRow('Spending total', data.spending, false) +
        '<tr class="section-div"><td colspan="' + cols + '">Summary</td></tr>' +
        netRow +
      '</tbody></table>';
  }

  function setChart(k) { activeChart = k; renderChart(); }

  renderStats();
  renderChart();
  renderTable();
</script>
</body>
</html>
