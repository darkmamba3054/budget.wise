<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debt Tracker — CheckMate Budget</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth-guard.js"></script>
  
  <style>
    .snowball-banner { background: var(--green-l); border: 1px solid var(--green-m); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
    .snowball-icon { font-size: 20px; flex-shrink: 0; }
    .snowball-text { font-size: 13px; color: #2a5c3f; line-height: 1.6; }
    .snowball-text strong { font-weight: 600; }
    .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    .search { padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--card); color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; width: 200px; }
    .search:focus { border-color: var(--green); }
    .filter-btn { padding: 6px 14px; border-radius: 99px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); background: var(--card); color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
    .filter-btn.active { background: var(--green); color: white; border-color: var(--green); }
    .debt-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody td { padding: 12px 12px; border-bottom: 1px solid var(--bg2); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg); }
    tbody tr.snowball-next td { background: var(--green-l); }
    .debt-name { font-weight: 500; color: var(--text); }
    .debt-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .prog-track { height: 4px; background: var(--bg2); border-radius: 99px; overflow: hidden; margin-top: 5px; min-width: 80px; }
    .prog-fill { height: 100%; border-radius: 99px; background: var(--green); }
    .inline-input { width: 100px; padding: 4px 8px; font-size: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; }
    .inline-input:focus { border-color: var(--green); background: var(--card); }
    .inline-date { width: 120px; }
    .actions { display: flex; gap: 5px; }
    .act-btn { padding: 4px 9px; border-radius: 5px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text2); font-family: 'DM Sans', sans-serif; white-space: nowrap; }
    .act-btn.green { background: var(--green-l); color: var(--green); border-color: var(--green-m); }
    .act-btn.red { background: var(--red-l); color: var(--red); border-color: #f5bbb4; }
    .snowball-tag { font-size: 10px; background: var(--green); color: white; padding: 1px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }
    .rank-num { color: var(--text3); font-size: 12px; }
    .settled-row td { opacity: 0.45; text-decoration: line-through; }
    .add-form { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
    .add-form h2 { font-family: 'DM Serif Display', serif; font-size: 18px; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media(max-width:640px) { .form-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>

<script src="nav.js"></script>

<div class="page">
  <div class="page-header">
    <h1>Debt Tracker</h1>
    <p>Snowball method — tackle smallest balances first to build momentum.</p>
  </div>

  <!-- Summary cards -->
  <div class="grid-3" style="margin-bottom:20px;" id="summary-cards"></div>

  <!-- Snowball tip -->
  <div class="snowball-banner">
    <div class="snowball-icon">❄️</div>
    <div class="snowball-text" id="snowball-tip"></div>
  </div>

  <!-- Add new debt form -->
  <div class="add-form">
    <h2>Add a debt</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Debt name</label>
        <input type="text" id="add-name" placeholder="e.g. Credit One Bank">
      </div>
      <div class="form-group">
        <label>Original creditor</label>
        <input type="text" id="add-creditor" placeholder="e.g. Capital One">
      </div>
      <div class="form-group">
        <label>Collection agency</label>
        <input type="text" id="add-agency" placeholder="e.g. Midland Credit">
      </div>
      <div class="form-group">
        <label>Current balance ($)</label>
        <input type="number" id="add-balance" placeholder="0.00" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="add-priority">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>
      </div>
      <div class="form-group">
        <label>Need to call?</label>
        <select id="add-call">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addDebt()">Add debt</button>
  </div>

  <!-- Filters -->
  <div class="controls">
    <input class="search" type="text" placeholder="Search debts..." oninput="filterDebts(this.value)">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('high', this)">High priority</button>
    <button class="filter-btn" onclick="setFilter('call', this)">Need to call</button>
    <button class="filter-btn" onclick="setFilter('car', this)">Car loan</button>
    <button class="filter-btn" onclick="setFilter('settled', this)">Settled</button>
  </div>

  <!-- Table -->
  <div class="card" style="padding:0; overflow:hidden;">
    <div class="debt-table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Debt / Creditor</th>
            <th>Collection Agency</th>
            <th>Balance</th>
            <th>Settlement Offer</th>
            <th>Payment Plan</th>
            <th>Priority</th>
            <th>Call?</th>
            <th>Next Action</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="debt-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  var db          = (window.supabase || window.supabasejs).createClient(SUPABASE_URL, SUPABASE_KEY);
  var currentUser = null;
  var debts       = [];
  var currentFilter = 'all';
  var searchTerm    = '';

  document.addEventListener('DOMContentLoaded', function() {
    db.auth.getSession().then(function(res) {
      if (!res.data || !res.data.session) { window.location.replace('login.html'); return; }
      currentUser = res.data.session.user;
      loadDebts();
    });
  });

  function loadDebts() {
    db.from('debts').select('*').eq('user_id', currentUser.id).order('balance', { ascending: true })
      .then(function(res) {
        debts = (res.data || []).map(function(d) {
          return { id:d.id, name:d.name, agency:d.agency||'Unknown', creditor:d.creditor||'', balance:parseFloat(d.balance), settlement:d.our_offer||'', plan:d.notes||'', nextAction:'', priority:d.priority||'Low', call:d.call||false, settled:d.settled||false };
        });
        renderSummary();
        renderTable();
      });
  }

  function fmt(n) { return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits:0, maximumFractionDigits:0 }); }
  function getSorted() { return debts.slice().sort(function(a,b){ return a.balance - b.balance; }); }

  function renderSummary() {
    var total = debts.reduce(function(s,d){ return s+d.balance; }, 0);
    var excl  = debts.filter(function(d){ return !d.name.toLowerCase().includes('car'); }).reduce(function(s,d){ return s+d.balance; }, 0);
    var calls = debts.filter(function(d){ return d.call && !d.settled; }).length;
    var next  = getSorted().filter(function(d){ return !d.settled; })[0];
    document.getElementById('summary-cards').innerHTML =
      '<div class="card"><div class="card-title">Total debt</div><div class="card-value red">' + fmt(total) + '</div><div class="card-sub">' + debts.length + ' accounts</div></div>' +
      '<div class="card"><div class="card-title">Excl. car loan</div><div class="card-value amber">' + fmt(excl) + '</div><div class="card-sub">Collection accounts</div></div>' +
      '<div class="card"><div class="card-title">Need to call</div><div class="card-value amber">' + calls + '</div><div class="card-sub">Active accounts</div></div>';
    document.getElementById('snowball-tip').innerHTML = next
      ? '<strong>Snowball target:</strong> Focus every extra dollar on <strong>' + next.name + ' (' + fmt(next.balance) + ')</strong> — smallest active balance.'
      : debts.length ? 'All debts settled!' : 'Add your first debt below to start tracking.';
  }

  function renderTable() {
    var list = getSorted();
    if (currentFilter === 'high')    list = list.filter(function(d){ return d.priority === 'High'; });
    if (currentFilter === 'call')    list = list.filter(function(d){ return d.call && !d.settled; });
    if (currentFilter === 'car')     list = list.filter(function(d){ return d.name.toLowerCase().includes('car'); });
    if (currentFilter === 'settled') list = list.filter(function(d){ return d.settled; });
    if (currentFilter === 'all')     list = list.filter(function(d){ return !d.settled; });
    if (searchTerm) list = list.filter(function(d){ return d.name.toLowerCase().includes(searchTerm)||d.creditor.toLowerCase().includes(searchTerm)||d.agency.toLowerCase().includes(searchTerm); });
    if (!debts.length) { document.getElementById('debt-tbody').innerHTML = '<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--text3);">No debts yet — add your first account above.</td></tr>'; return; }
    if (!list.length)  { document.getElementById('debt-tbody').innerHTML = '<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--text3);">No debts match this filter.</td></tr>'; return; }
    var firstActive = getSorted().findIndex(function(d){ return !d.settled; });
    document.getElementById('debt-tbody').innerHTML = list.map(function(d) {
      var i = debts.indexOf(d), rank = getSorted().indexOf(d)+1, isNext = getSorted().indexOf(d)===firstActive;
      var priClass = d.priority==='High'?'badge-red':d.priority==='Medium'?'badge-amber':'badge-gray';
      return '<tr class="'+(d.settled?'settled-row':isNext?'snowball-next':'')+'"><td><span class="rank-num">'+rank+'</span>'+(isNext?'<span class="snowball-tag">NEXT</span>':'')+
        '</td><td><div class="debt-name">'+d.name+'</div><div class="debt-sub">'+d.creditor+'</div><div class="prog-track"><div class="prog-fill" style="width:'+(d.settled?100:0)+'%"></div></div></td>'+
        '<td style="font-size:12px;color:var(--text2);">'+d.agency+'</td><td style="font-weight:600;">'+fmt(d.balance)+'</td>'+
        '<td><input class="inline-input" placeholder="e.g. $86" value="'+d.settlement+'" oninput="updateField('+i+','settlement',this.value)"></td>'+
        '<td><input class="inline-input" placeholder="e.g. $50/mo" value="'+d.plan+'" oninput="updateField('+i+','plan',this.value)"></td>'+
        '<td><span class="badge '+priClass+'">'+d.priority+'</span></td>'+
        '<td><span class="badge '+(d.call?'badge-green':'badge-gray')+'">'+(d.call?'Yes':'No')+'</span></td>'+
        '<td><input class="inline-input inline-date" type="date" value="'+d.nextAction+'" oninput="updateField('+i+','nextAction',this.value)"></td>'+
        '<td><div class="actions"><button class="act-btn green" onclick="markContacted('+i+')">Contacted</button><button class="act-btn red" onclick="markSettled('+i+')">'+(d.settled?'Undo':'Settled ✓')+'</button></div></td></tr>';
    }).join('');
  }

  function updateField(i,f,v){ debts[i][f]=v; }

  function markContacted(i) {
    alert('✓ ' + debts[i].name + ' marked as contacted today.');
  }

  function markSettled(i) {
    var newVal = !debts[i].settled;
    db.from('debts').update({ settled: newVal }).eq('id', debts[i].id).then(function(res) {
      if (res.error) { alert('Error: ' + res.error.message); return; }
      setTimeout(function() { loadDebts(); }, 300);
    });
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderTable();
  }

  function filterDebts(val) { searchTerm = val.toLowerCase(); renderTable(); }

  function addDebt() {
    var name=document.getElementById('add-name').value.trim(), creditor=document.getElementById('add-creditor').value.trim();
    var agency=document.getElementById('add-agency').value.trim()||'Unknown', balance=parseFloat(document.getElementById('add-balance').value)||0;
    var priority=document.getElementById('add-priority').value, call=document.getElementById('add-call').value==='true';
    if (!name||!balance) { alert('Please enter at least a name and balance.'); return; }
    db.from('debts').insert({ user_id:currentUser.id, name:name, agency:agency, creditor:creditor, balance:balance, priority:priority, call:call, settled:false })
      .then(function(res) {
        if (res.error) { alert('Error: '+res.error.message); return; }
        document.getElementById('add-name').value=''; document.getElementById('add-creditor').value='';
        document.getElementById('add-agency').value=''; document.getElementById('add-balance').value='';
        loadDebts();
      });
  }
</script>

</body>
</html>
