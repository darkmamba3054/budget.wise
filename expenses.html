<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses — BudgetWise</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script src="nav.js"></script>

<div class="page">
  <div class="page-header">
    <h1>Expenses</h1>
    <p>Track every dollar you spend.</p>
  </div>

  <!-- Add expense form -->
  <div class="card" style="margin-bottom: 24px;">
    <div class="section-header" style="margin-bottom:20px;">
      <h2>Add an expense</h2>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="exp-name">Expense name</label>
        <input type="text" id="exp-name" placeholder="e.g. Groceries">
      </div>
      <div class="form-group">
        <label for="exp-amount">Amount ($)</label>
        <input type="number" id="exp-amount" placeholder="0.00" min="0" step="0.01">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="exp-category">Category</label>
        <select id="exp-category">
          <option value="">Select a category</option>
          <option>Food & Groceries</option>
          <option>Housing</option>
          <option>Transport</option>
          <option>Subscription</option>
          <option>Entertainment</option>
          <option>Health</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="exp-date">Date</label>
        <input type="date" id="exp-date">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addExpense()">Add expense</button>
  </div>

  <!-- Expense list -->
  <div class="section-header">
    <h2>This month</h2>
    <span style="font-size:14px; color:var(--text2);">Total: <strong id="total-display">$1,033.40</strong></span>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Date</th>
            <th>Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expense-tbody">
          <tr>
            <td>Groceries — Trader Joe's</td>
            <td><span class="badge badge-green">Food</span></td>
            <td style="color:var(--text2);">May 12, 2026</td>
            <td style="font-weight:500;">$67.40</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Remove</button></td>
          </tr>
          <tr>
            <td>Gas</td>
            <td><span class="badge badge-amber">Transport</span></td>
            <td style="color:var(--text2);">May 10, 2026</td>
            <td style="font-weight:500;">$48.00</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Remove</button></td>
          </tr>
          <tr>
            <td>Netflix</td>
            <td><span class="badge badge-gray">Subscription</span></td>
            <td style="color:var(--text2);">May 1, 2026</td>
            <td style="font-weight:500;">$18.00</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Remove</button></td>
          </tr>
          <tr>
            <td>Rent</td>
            <td><span class="badge badge-red">Housing</span></td>
            <td style="color:var(--text2);">May 1, 2026</td>
            <td style="font-weight:500;">$900.00</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Remove</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // Set today's date as default
  document.getElementById('exp-date').valueAsDate = new Date();

  const categoryBadge = {
    'Food & Groceries': 'badge-green',
    'Housing':          'badge-red',
    'Transport':        'badge-amber',
    'Subscription':     'badge-gray',
    'Entertainment':    'badge-gray',
    'Health':           'badge-green',
    'Other':            'badge-gray',
  };

  function addExpense() {
    const name     = document.getElementById('exp-name').value.trim();
    const amount   = parseFloat(document.getElementById('exp-amount').value);
    const category = document.getElementById('exp-category').value;
    const date     = document.getElementById('exp-date').value;

    if (!name || !amount || !category || !date) {
      alert('Please fill in all fields.');
      return;
    }

    const d = new Date(date + 'T00:00:00');
    const dateStr = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    const badge = categoryBadge[category] || 'badge-gray';
    const shortCat = category.replace(' & Groceries','').replace('Food','Food');

    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${name}</td>
      <td><span class="badge ${badge}">${shortCat}</span></td>
      <td style="color:var(--text2);">${dateStr}</td>
      <td style="font-weight:500;">$${amount.toFixed(2)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteRow(this)">Remove</button></td>
    `;
    document.getElementById('expense-tbody').prepend(row);

    // Clear form
    document.getElementById('exp-name').value = '';
    document.getElementById('exp-amount').value = '';
    document.getElementById('exp-category').value = '';
    document.getElementById('exp-date').valueAsDate = new Date();
  }

  function deleteRow(btn) {
    btn.closest('tr').remove();
  }
</script>

</body>
</html>
