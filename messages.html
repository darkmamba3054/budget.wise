<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — CheckMate Budget</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth-guard.js"></script>
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      height: calc(100vh - 120px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .msg-sidebar { border-right: 1px solid var(--border); background: var(--bg); display: flex; flex-direction: column; }
    .msg-sidebar-head { padding: 16px; border-bottom: 1px solid var(--border); font-size: 15px; font-weight: 600; color: var(--text); }
    .thread-item { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--bg2); transition: background 0.1s; }
    .thread-item:hover { background: var(--card); }
    .thread-item.active { background: var(--card); border-left: 3px solid var(--green); }
    .thread-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; background: var(--green); color: white; }
    .thread-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .thread-preview { font-size: 11px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
    .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-left: auto; flex-shrink: 0; }
    .no-threads { padding: 24px 16px; font-size: 13px; color: var(--text3); text-align: center; line-height: 1.6; }
    .no-threads a { color: var(--green); text-decoration: none; font-weight: 500; }
    .chat-area { display: flex; flex-direction: column; }
    .chat-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--card); }
    .chat-head-info { }
    .chat-head-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .chat-head-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
    .chat-empty-head { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--text3); display: flex; align-items: center; }
    .chat-messages { flex: 1; padding: 20px 18px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; background: var(--bg); }
    .msg-row { display: flex; gap: 8px; align-items: flex-end; }
    .msg-row.mine { flex-direction: row-reverse; }
    .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; background: var(--green); color: white; }
    .msg-body { max-width: 65%; }
    .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.55; }
    .msg-bubble.theirs { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; }
    .msg-bubble.mine { background: var(--green); color: white; border-radius: 16px 16px 4px 16px; }
    .msg-ref { margin-top: 6px; border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--card); }
    .msg-ref.mine { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }
    .msg-ref-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
    .msg-ref-label.mine { color: rgba(255,255,255,0.65); }
    .msg-ref-name { font-weight: 500; color: var(--text); }
    .msg-ref-name.mine { color: white; }
    .msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; }
    .msg-time.mine { text-align: right; }
    .chat-input-area { padding: 14px 18px; border-top: 1px solid var(--border); background: var(--card); }
    .ref-pill { display: inline-flex; align-items: center; gap: 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px; font-size: 12px; color: var(--text2); margin-bottom: 10px; cursor: pointer; transition: all 0.15s; }
    .ref-pill:hover { border-color: var(--green); color: var(--green); }
    .ref-pill.has-ref { background: var(--green-l); border-color: var(--green-m); color: var(--green); }
    .ref-picker { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; margin-bottom: 10px; display: none; box-shadow: var(--shadow); }
    .ref-picker.open { display: block; }
    .ref-picker-title { font-size: 11px; color: var(--text3); padding: 4px 8px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .ref-option { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text); }
    .ref-option:hover { background: var(--bg); }
    .ref-option-type { font-size: 11px; font-weight: 500; padding: 1px 7px; border-radius: 99px; flex-shrink: 0; }
    .input-row { display: flex; gap: 10px; align-items: flex-end; }
    .input-row textarea { flex: 1; padding: 10px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); resize: none; height: 40px; outline: none; line-height: 1.5; }
    .input-row textarea:focus { border-color: var(--green); background: var(--card); }
    .send-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--green); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    .chat-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--text3); font-size: 14px; text-align: center; padding: 32px; }
    .date-divider { text-align: center; font-size: 11px; color: var(--text3); margin: 4px 0; }
  </style>
</head>
<body>

<script src="nav.js"></script>

<div class="page" style="padding-bottom: 0;">
  <div class="page-header">
    <h1>Messages</h1>
    <p>Stay in touch with your accountability partners.</p>
  </div>

  <div class="messages-layout">
    <!-- Sidebar -->
    <div class="msg-sidebar">
      <div class="msg-sidebar-head">Conversations</div>
      <div id="threads-list">
        <div class="no-threads">
          No partners yet.<br>
          <a href="settings.html">Invite someone →</a>
        </div>
      </div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area">
      <div class="chat-placeholder" id="chat-placeholder">
        <div style="font-size:32px;">💬</div>
        <div>Select a conversation to start messaging</div>
        <div style="font-size:13px;">Your accountability partners can comment on your budget and decisions</div>
      </div>
    </div>
  </div>
</div>

<script>
  var db       = (window.supabase || window.supabasejs).createClient(SUPABASE_URL, SUPABASE_KEY);
  var currentUser = null;
  var activeThread = null;
  var threads  = [];
  var messages = {};
  var selectedRef = null;

  // Sample budget items to reference
  var budgetItems = [
    { type:'Purchase', label:'Gaming keyboard — Waited',       badgeBg:'#fdf3e7', badgeColor:'#c97b2e' },
    { type:'Purchase', label:'Smart watch — Skipped',           badgeBg:'#fdecea', badgeColor:'#c0442a' },
    { type:'Debt',     label:'WEBBANK/FINGERHUT — $144',        badgeBg:'#fdecea', badgeColor:'#c0442a' },
    { type:'Debt',     label:'Capital One — $3,019',            badgeBg:'#fdecea', badgeColor:'#c0442a' },
    { type:'Goal',     label:'Emergency Fund — 40% complete',   badgeBg:'#e8f3ed', badgeColor:'#3a7d5a' },
    { type:'Goal',     label:'Italy Vacation — 32% complete',   badgeBg:'#e8f3ed', badgeColor:'#3a7d5a' },
    { type:'Bill',     label:'Car Payment — $1,015',            badgeBg:'#eee9e1', badgeColor:'#7a6e62' },
    { type:'Bill',     label:'Cell Phone — $160',               badgeBg:'#eee9e1', badgeColor:'#7a6e62' },
  ];

  document.addEventListener('DOMContentLoaded', function() {
    db.auth.getSession().then(function(res) {
      if (!res.data || !res.data.session) { window.location.replace('login.html'); return; }
      currentUser = res.data.session.user;
      loadThreads();
    });
  });

  function loadThreads() {
    // Load accountability partners
    db.from('accountability_links')
      .select('*, partner:partner_user_id(id, email, raw_user_meta_data), owner:owner_user_id(id, email, raw_user_meta_data)')
      .or('owner_user_id.eq.' + currentUser.id + ',partner_user_id.eq.' + currentUser.id)
      .eq('status', 'active')
      .then(function(res) {
        threads = (res.data || []).map(function(link) {
          var isOwner = link.owner_user_id === currentUser.id;
          var other   = isOwner ? link.partner : link.owner;
          var name    = (other && other.raw_user_meta_data && other.raw_user_meta_data.full_name) || (other && other.email && other.email.split('@')[0]) || 'Partner';
          var initials = name.split(' ').map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2);
          return { id: link.id, name: name, initials: initials, otherId: other && other.id, messages: [] };
        });

        // Add sample thread for demo if no real partners yet
        if (!threads.length) {
          threads = [
            { id:'demo-victor', name:'Victor (demo)', initials:'VR', otherId:'demo', messages:[
              { from:'them', text:'Hey — saw you skipped the smart watch. Good call!', ref:{ type:'Purchase', label:'Smart watch — Skipped' }, time:'May 14, 9:02am' },
              { from:'me',   text:'Thanks! Trying to stay focused on the debt paydown.', ref:null, time:'May 14, 9:15am' },
              { from:'them', text:'How close are you to paying off the Fingerhut one?', ref:null, time:'May 14, 9:18am' },
              { from:'me',   text:'Should have it cleared by the 21st paycheck!', ref:{ type:'Debt', label:'WEBBANK/FINGERHUT — $144' }, time:'May 14, 9:21am' },
            ]},
          ];
        }

        renderThreadList();
      });
  }

  function renderThreadList() {
    var list = document.getElementById('threads-list');
    if (!threads.length) return;
    list.innerHTML = threads.map(function(t, i) {
      var lastMsg   = t.messages && t.messages.length ? t.messages[t.messages.length-1] : null;
      var preview   = lastMsg ? lastMsg.text.slice(0,35) + (lastMsg.text.length > 35 ? '...' : '') : 'No messages yet';
      var isActive  = activeThread && activeThread.id === t.id;
      return '<div class="thread-item ' + (isActive?'active':'') + '" onclick="openThread(' + i + ')">' +
        '<div class="thread-avatar">' + t.initials + '</div>' +
        '<div style="min-width:0;">' +
          '<div class="thread-name">' + t.name + '</div>' +
          '<div class="thread-preview">' + preview + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function openThread(idx) {
    activeThread = threads[idx];
    renderThreadList();
    renderChatArea();
  }

  function renderChatArea() {
    var area = document.getElementById('chat-area');
    if (!activeThread) return;

    var msgsHtml = (activeThread.messages || []).map(function(m) {
      var isMine = m.from === 'me';
      var refHtml = '';
      if (m.ref) {
        refHtml = '<div class="msg-ref ' + (isMine?'mine':'') + '">' +
          '<div class="msg-ref-label ' + (isMine?'mine':'') + '">' + m.ref.type + '</div>' +
          '<div class="msg-ref-name ' + (isMine?'mine':'') + '">' + m.ref.label + '</div>' +
        '</div>';
      }
      return '<div class="msg-row ' + (isMine?'mine':'') + '">' +
        (!isMine ? '<div class="msg-avatar">' + activeThread.initials + '</div>' : '') +
        '<div class="msg-body">' +
          '<div class="msg-bubble ' + (isMine?'mine':'theirs') + '">' + m.text + '</div>' +
          refHtml +
          '<div class="msg-time ' + (isMine?'mine':'') + '">' + m.time + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    if (!msgsHtml) {
      msgsHtml = '<div style="text-align:center;padding:32px;font-size:13px;color:var(--text3);">No messages yet. Say hello!</div>';
    }

    area.innerHTML =
      '<div class="chat-head">' +
        '<div class="thread-avatar">' + activeThread.initials + '</div>' +
        '<div class="chat-head-info">' +
          '<div class="chat-head-name">' + activeThread.name + '</div>' +
          '<div class="chat-head-sub">Accountability partner</div>' +
        '</div>' +
      '</div>' +
      '<div class="chat-messages" id="chat-messages">' + msgsHtml + '</div>' +
      '<div class="chat-input-area">' +
        '<div class="ref-pill ' + (selectedRef?'has-ref':'') + '" id="ref-pill" onclick="togglePicker()">' +
          '🔗 ' + (selectedRef ? selectedRef.label : 'Reference a budget item') +
          ' ▾' +
        '</div>' +
        '<div class="ref-picker" id="ref-picker">' +
          '<div class="ref-picker-title">Choose an item to reference</div>' +
          budgetItems.map(function(item, i) {
            return '<div class="ref-option" onclick="selectRef(' + i + ')">' +
              '<span class="ref-option-type" style="background:' + item.badgeBg + ';color:' + item.badgeColor + ';">' + item.type + '</span>' +
              item.label +
            '</div>';
          }).join('') +
        '</div>' +
        '<div class="input-row">' +
          '<textarea id="msg-input" placeholder="Message ' + activeThread.name + '..." onkeydown="handleKey(event)"></textarea>' +
          '<button class="send-btn" onclick="sendMessage()">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/></svg>' +
          '</button>' +
        '</div>' +
      '</div>';

    // Scroll to bottom
    var msgs = document.getElementById('chat-messages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }

  function togglePicker() {
    var p = document.getElementById('ref-picker');
    if (p) p.classList.toggle('open');
  }

  function selectRef(idx) {
    selectedRef = budgetItems[idx];
    var pill = document.getElementById('ref-pill');
    if (pill) {
      pill.className = 'ref-pill has-ref';
      pill.textContent = '🔗 ' + selectedRef.label + ' ✕';
      pill.onclick = function() { selectedRef = null; renderChatArea(); };
    }
    var p = document.getElementById('ref-picker');
    if (p) p.classList.remove('open');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendMessage() {
    var input = document.getElementById('msg-input');
    if (!input) return;
    var text = input.value.trim();
    if (!text) return;

    var now  = new Date().toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    var msg  = { from:'me', text:text, ref: selectedRef ? { type:selectedRef.type, label:selectedRef.label } : null, time: now };

    if (!activeThread.messages) activeThread.messages = [];
    activeThread.messages.push(msg);
    selectedRef = null;

    // Save to Supabase if real thread
    if (!activeThread.id.includes('demo')) {
      db.from('messages').insert({
        thread_id:   activeThread.id,
        sender_id:   currentUser.id,
        text:        text,
        ref_type:    msg.ref ? msg.ref.type  : null,
        ref_label:   msg.ref ? msg.ref.label : null,
        created_at:  new Date().toISOString(),
      }).then(function(){});
    }

    renderThreadList();
    renderChatArea();
  }
</script>

</body>
</html>
